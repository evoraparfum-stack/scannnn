<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>EVORA OCR TEST</title>

  <link rel="stylesheet" href="style.css">

  <!-- OCR -->
  <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

<div class="container">

<h1>EVORA OCR TEST</h1>

<div class="card">

<input
type="file"
id="imageInput"
accept="image/*">

<img id="preview">

<button id="scanBtn">
🔍 Scan OCR
</button>

</div>

<div class="card">

<h3>Status</h3>

<div id="status">

Belum Scan

</div>

</div>

<div class="card">

<h3>OCR Result</h3>

<pre id="ocrResult"></pre>

</div>

<div class="card">

<h3>Varian</h3>

<div id="variantResult">-</div>

</div>

<div class="card">

<h3>Qty</h3>

<div id="qtyResult">-</div>

</div>

<div class="card">

<h3>Output</h3>

<pre id="outputResult"></pre>

</div>

</div>

<script src="data.js"></script>
<script src="parser.js"></script>
<script src="app.js"></script>

</body>
</html>
